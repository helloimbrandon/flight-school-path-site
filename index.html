<!DOCTYPE html>
<!-- Flight School Path — auto-deployed from private repo -->
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#f4f7fb" />
<title>Flight School Path</title>
<style>
  :root{
    --bg:#f4f7fb; --surface:#ffffff;
    --ink:#0b1f33; --ink2:#34465c; --muted:#6b7a8d;
    --line:#edf1f6;
    --accent:#0a84ff; --accent-deep:#0066d6; --accent-soft:#eaf3ff;
    --good:#34c759; --good-soft:#e8faee;
    --warn:#ff9f0a; --danger:#ff3b30;
    --r:18px; --r-sm:12px;
    --shadow:0 1px 2px rgba(16,40,70,.05),0 10px 30px rgba(16,40,70,.05);
    --shadow-sm:0 1px 2px rgba(16,40,70,.06);
  }
  *{box-sizing:border-box}
  html{-webkit-text-size-adjust:100%;scroll-behavior:smooth}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    color:var(--ink);background:var(--bg);line-height:1.5;-webkit-font-smoothing:antialiased}
  h1,h2,h3,h4{letter-spacing:-.02em}
  a{color:var(--accent)}
  button{font-family:inherit}

  /* Top bar */
  .topbar{position:sticky;top:0;z-index:40;background:rgba(244,247,251,.82);
    backdrop-filter:saturate(180%) blur(16px);-webkit-backdrop-filter:saturate(180%) blur(16px);
    border-bottom:1px solid var(--line)}
  .topbar .bar{max-width:1000px;margin:0 auto;padding:12px 20px;display:flex;align-items:center;gap:14px}
  .titles{min-width:0;flex:1}
  .titles h1{margin:0;font-size:1.16rem;font-weight:700;white-space:nowrap}
  .titles .sub{margin:1px 0 0;font-size:.76rem;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .iconbtn{width:38px;height:38px;border-radius:50%;border:none;background:var(--surface);box-shadow:var(--shadow-sm);
    cursor:pointer;font-size:1rem;display:inline-flex;align-items:center;justify-content:center;color:var(--ink2);flex:0 0 auto}
  .menubtn{display:none;font-size:1.2rem}
  .pc{display:flex;align-items:center;gap:8px;flex:0 0 auto}
  .ring{width:34px;height:34px;transform:rotate(-90deg)}
  .ring circle{fill:none;stroke-width:3.4}
  .ring .ring-bg{stroke:#e3eaf2}
  .ring .ring-fg{stroke:var(--accent);stroke-linecap:round;stroke-dasharray:100 100;stroke-dashoffset:100;
    transition:stroke-dashoffset .55s ease}
  .pctext{display:flex;flex-direction:column;line-height:1.04}
  .pctext b{font-size:.82rem;font-weight:700}
  .pctext span{font-size:.66rem;color:var(--muted)}
  .searchrow{max-width:1000px;margin:0 auto;padding:0 20px;max-height:0;overflow:hidden;
    transition:max-height .22s ease,padding .22s ease}
  .searchrow.open{max-height:64px;padding:0 20px 12px}
  .searchrow input{width:100%;border:1px solid var(--line);background:var(--surface);border-radius:12px;
    padding:10px 14px;font-size:.95rem;font-family:inherit;box-shadow:var(--shadow-sm)}
  .searchrow input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 4px var(--accent-soft)}

  /* Layout */
  .layout{max-width:1000px;margin:0 auto;display:flex;gap:30px;padding:0 20px;align-items:flex-start}
  .sidebar{width:212px;flex:0 0 auto;position:sticky;top:72px;padding:22px 0 40px}
  .navgroup{display:flex;flex-direction:column;gap:2px}
  .navlabel{font-size:.68rem;font-weight:800;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);
    padding:20px 14px 6px}
  .navitem{display:flex;align-items:center;gap:11px;width:100%;border:none;background:none;cursor:pointer;
    padding:9px 14px;border-radius:11px;font-size:.95rem;font-weight:600;color:var(--ink2);text-align:left}
  .navitem:hover{background:#eaf0f7}
  .navitem.active{background:var(--accent-soft);color:var(--accent-deep)}
  .navitem .nicon{font-size:1.05rem;width:22px;text-align:center;flex:0 0 auto}
  .content{flex:1;min-width:0;padding:24px 0 40px;max-width:680px}

  /* Section header */
  .block{animation:fade .25s ease}
  @keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  .sechead{margin:2px 0 18px}
  .sechead h2{margin:0;font-size:1.62rem;font-weight:700}
  .sechead .guide{margin:7px 0 0;font-size:.95rem;color:var(--muted);max-width:54ch}

  /* Next up */
  .nextup{margin:0 0 28px}
  .nuhead{margin:0 0 12px}
  .nuhead h2{margin:0;font-size:1.02rem;font-weight:700}
  .nuhead p{margin:3px 0 0;font-size:.88rem;color:var(--muted)}
  .features{display:grid;gap:12px}
  .feature{background:var(--surface);border-radius:var(--r);box-shadow:var(--shadow);padding:16px 17px;border:1px solid var(--line)}
  .feature.done{opacity:.62}
  .fhead{display:flex;align-items:center;gap:10px;margin-bottom:9px}
  .prio{font-size:.66rem;font-weight:800;text-transform:uppercase;letter-spacing:.05em;color:var(--accent-deep);
    background:var(--accent-soft);padding:3px 9px;border-radius:99px}
  .donetag{font-size:.66rem;font-weight:800;text-transform:uppercase;letter-spacing:.05em;color:#1a7f37;
    background:var(--good-soft);padding:3px 9px;border-radius:99px;margin-left:auto}
  .feature h3{margin:0 0 5px;font-size:1.12rem;font-weight:700}
  .fwhy{margin:0 0 14px;font-size:.92rem;color:var(--ink2)}
  .factions{display:flex;flex-wrap:wrap;gap:8px}

  /* round check */
  .check{width:26px;height:26px;flex:0 0 auto;border-radius:50%;border:2px solid #cfd9e6;background:var(--surface);
    cursor:pointer;position:relative;transition:.15s;padding:0}
  .check:hover{border-color:var(--accent)}
  .check.on,.trow.done .check{background:var(--good);border-color:var(--good)}
  .check.on::after,.trow.done .check::after{content:"✓";position:absolute;inset:0;display:flex;align-items:center;
    justify-content:center;color:#fff;font-size:14px;font-weight:900}

  /* buttons */
  .btn{display:inline-flex;align-items:center;gap:6px;border-radius:11px;padding:9px 15px;font-size:.9rem;font-weight:650;
    cursor:pointer;border:1px solid transparent;text-decoration:none;font-family:inherit}
  .btn.primary{background:var(--accent);color:#fff}
  .btn.primary:hover{background:var(--accent-deep)}
  .btn.ghost{background:#eef3f9;color:var(--ink2)}
  .btn.ghost:hover{background:#e3ecf5}

  /* priority groups */
  .pgroup{margin:0 0 20px}
  .plabel{font-size:.7rem;font-weight:800;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin:0 2px 9px}
  .pgroup.first .plabel{color:var(--accent-deep)}
  .tasks{display:flex;flex-direction:column;gap:8px}
  .empty{padding:22px;text-align:center;color:var(--muted);font-size:.9rem;background:var(--surface);
    border-radius:var(--r);box-shadow:var(--shadow-sm)}

  /* task row */
  .trow{background:var(--surface);border-radius:14px;box-shadow:var(--shadow-sm);border:1px solid var(--line);overflow:hidden}
  .trow.done{background:#fbfdfe}
  .trowmain{display:flex;align-items:center;gap:12px;padding:13px 15px;cursor:pointer}
  .trow .tbody{flex:1;min-width:0}
  .ttitle{font-size:.97rem;font-weight:600;line-height:1.3}
  .trow.done .ttitle{color:var(--muted);text-decoration:line-through}
  .tmeta{display:flex;gap:8px;align-items:center;margin-top:3px}
  .tdot{font-size:.72rem;font-weight:700;color:#b86b00}
  .duechip{font-size:.72rem;font-weight:700;color:var(--muted);background:#f0f4f9;padding:2px 8px;border-radius:99px}
  .duechip.due-soon{background:#fff4e3;color:#b86b00}
  .duechip.overdue{background:#ffe9e7;color:#c5291d}
  .chev{flex:0 0 auto;border:none;background:none;color:#b6c2d2;font-size:1.05rem;cursor:pointer;
    transition:transform .2s;padding:4px;line-height:1}
  .trow.open .chev{transform:rotate(180deg)}
  .tdrawer{display:none;padding:2px 15px 15px;border-top:1px solid var(--line)}
  .trow.open .tdrawer{display:block}
  .tdrawer .dwhy{margin:13px 0 6px;font-size:.9rem;color:var(--ink2)}
  .tdrawer .dneed{margin:6px 0;font-size:.88rem;color:var(--ink2)}
  .tdrawer .dneed b,.tdrawer .dwhy b{color:var(--ink)}
  .drow{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin:13px 0}
  .dfield{margin:11px 0}
  .dfield label{display:block;font-size:.74rem;font-weight:700;color:var(--muted);margin-bottom:5px}
  .dfield input,.dfield textarea{width:100%;border:1px solid var(--line);border-radius:10px;padding:9px 11px;
    font-family:inherit;font-size:.9rem;background:var(--surface)}
  .dfield textarea{resize:vertical;min-height:54px}
  .dfield input:focus,.dfield textarea:focus,.status:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 4px var(--accent-soft)}
  .status{border:1px solid var(--line);border-radius:10px;padding:9px 11px;font-family:inherit;font-size:.9rem;
    background:var(--surface);font-weight:650;color:var(--ink2);cursor:pointer}

  /* card groups */
  .gcard{background:var(--surface);border-radius:var(--r);box-shadow:var(--shadow);border:1px solid var(--line);padding:16px;margin:0 0 14px}
  .gcard .ghead{display:flex;justify-content:space-between;gap:10px;margin-bottom:10px}
  .gcard .ghead h3{margin:0;font-size:1.05rem;font-weight:700}
  .pills{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px}
  .pill{font-size:.7rem;font-weight:700;background:#eef3f9;color:var(--ink2);border-radius:99px;padding:3px 9px}
  .pill.amount{background:var(--good-soft);color:#1a7f37}
  .gcard .tasks{margin-top:4px}
  .gactions{margin-top:12px}

  /* disclosure */
  .disc{margin:8px 0}
  .disc>summary{cursor:pointer;list-style:none;font-size:.85rem;font-weight:700;color:var(--accent-deep);
    display:flex;align-items:center;gap:7px;padding:4px 0}
  .disc>summary::-webkit-details-marker{display:none}
  .disc>summary::before{content:"›";font-size:1.15rem;transition:transform .15s;line-height:1}
  .disc[open]>summary::before{transform:rotate(90deg)}
  .disc .body{padding:6px 0 4px;font-size:.9rem;color:var(--ink2)}
  .disc .body p{margin:7px 0}
  .approach{margin:8px 0 0;padding:11px 13px;background:#f6f9fc;border-radius:12px}
  .approach .t{font-size:.72rem;font-weight:800;text-transform:uppercase;letter-spacing:.05em;color:var(--muted)}
  .approach ul{margin:6px 0 0;padding-left:18px}
  .approach li{margin:4px 0}

  /* generic card (sim/essay/recs/roadmap) */
  .card{background:var(--surface);border-radius:var(--r);box-shadow:var(--shadow);border:1px solid var(--line);padding:17px;margin:0 0 14px}
  .card h3{margin:0 0 6px;font-size:1.05rem}
  .card p.desc{margin:6px 0;font-size:.92rem;color:var(--ink2)}
  .card p.desc b{color:var(--ink)}
  .field{margin:12px 0}
  .field label{display:block;font-size:.78rem;font-weight:700;color:var(--muted);margin-bottom:5px}
  .field input,.field textarea,.field select{width:100%;border:1px solid var(--line);border-radius:11px;padding:11px;
    font-family:inherit;font-size:.92rem;background:var(--surface)}
  .field input:focus,.field textarea:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 4px var(--accent-soft)}
  .field input::placeholder,.field textarea::placeholder{color:#9fb0c2}
  .field input:placeholder-shown,.field textarea:placeholder-shown{border-style:dashed;border-color:#cfe0f5}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  @media(max-width:520px){.grid2{grid-template-columns:1fr}}
  .chips{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px}
  .chip{display:inline-flex;align-items:center;gap:7px;border:1px solid var(--line);border-radius:99px;padding:8px 13px;
    font-size:.86rem;cursor:pointer;background:var(--surface);user-select:none;font-weight:600}
  .chip input{accent-color:var(--good);width:16px;height:16px}
  .chip.on{background:var(--good-soft);border-color:#bdeccb;color:#1a7f37}
  .banner{background:#fff8ec;border:1px solid #ffe6bd;border-radius:12px;padding:12px 14px;margin:14px 0 0;font-size:.88rem;color:#8a5a00}
  .banner strong{color:#704700}
  .phase{border-left:2px solid var(--accent);padding:2px 0 2px 14px;margin:0 0 16px}
  .phase .when{font-size:.7rem;font-weight:800;text-transform:uppercase;letter-spacing:.05em;color:var(--muted)}
  .phase h4{margin:2px 0 4px;font-size:1rem;color:var(--accent-deep)}
  .phase ul{margin:0;padding-left:18px;font-size:.92rem;color:var(--ink2)}
  .phase li{margin:4px 0}
  .rec{border:1px solid var(--line);border-radius:14px;padding:14px;margin-bottom:10px;background:var(--surface);position:relative}
  .rec .rm{position:absolute;top:10px;right:10px;background:#fff0ef;color:var(--danger);border:1px solid #ffd6d2;
    border-radius:9px;width:28px;height:28px;cursor:pointer;font-weight:800}
  .addbtn{width:100%;border:1px dashed #b9d3f2;background:var(--accent-soft);color:var(--accent-deep);
    border-radius:12px;padding:12px;font-weight:700;cursor:pointer;font-size:.92rem}
  .hint{font-size:.82rem;color:var(--muted);margin:5px 0 0}

  /* footer + utility */
  footer{margin:34px 0 0;padding:18px 0 10px;text-align:center;color:var(--muted);font-size:.82rem;border-top:1px solid var(--line)}
  footer .futil{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-bottom:10px}
  .ctl{border:1px solid var(--line);background:var(--surface);color:var(--ink2);border-radius:11px;padding:9px 14px;
    font-size:.84rem;font-weight:650;cursor:pointer;font-family:inherit}
  .ctl:hover{background:#fff}
  .ctl.danger{color:var(--danger);border-color:#ffd6d2;background:#fff5f4}
  .syncbadge{display:inline-flex;align-items:center;gap:7px;font-size:.78rem;font-weight:600;color:var(--muted);justify-content:center}
  .syncbadge .dot{width:8px;height:8px;border-radius:50%;background:#cbd5e1}
  .syncbadge.on .dot{background:var(--good);box-shadow:0 0 0 3px rgba(52,199,89,.16)}
  .syncbadge.err .dot{background:var(--warn)}

  .saved-flash{position:fixed;left:50%;bottom:24px;transform:translateX(-50%) translateY(40px);background:var(--ink);
    color:#fff;padding:9px 16px;border-radius:99px;font-size:.82rem;font-weight:600;opacity:0;transition:.3s;z-index:60;
    box-shadow:0 8px 24px rgba(0,0,0,.25)}
  .saved-flash.show{opacity:1;transform:translateX(-50%) translateY(0)}

  /* Settings flyout — popover on desktop, bottom sheet on mobile */
  .flyout{position:fixed;inset:0;z-index:55;background:transparent;opacity:0;pointer-events:none;transition:opacity .18s}
  .flyout.open{opacity:1;pointer-events:auto}
  .flyout-card{position:absolute;top:62px;right:20px;width:264px;background:var(--surface);border:1px solid var(--line);
    border-radius:16px;box-shadow:var(--shadow);padding:8px;transform:translateY(-6px) scale(.98);opacity:0;
    transition:transform .18s ease,opacity .18s ease;transform-origin:top right}
  .flyout.open .flyout-card{transform:none;opacity:1}
  .flyout .sheethandle{display:none}
  .flyout-title{display:none}
  .menu-item{display:flex;align-items:center;gap:12px;width:100%;border:none;background:none;cursor:pointer;
    padding:11px 12px;border-radius:10px;font-size:.93rem;font-weight:600;color:var(--ink2);text-align:left;font-family:inherit}
  .menu-item:hover{background:#eef3f9}
  .menu-item span{font-size:1.05rem;width:20px;text-align:center;flex:0 0 auto}
  .menu-item.danger{color:var(--danger)}
  .menu-item.danger:hover{background:#fff5f4}
  .menu-sync{padding:11px 12px 6px;border-top:1px solid var(--line);margin-top:6px}
  .menu-sync .syncbadge{justify-content:flex-start}

  /* full-screen nav pane (mobile only) */
  .navpane{display:none}

  @media(max-width:820px){
    .sidebar{display:none}
    .layout{gap:0;padding:0 16px}
    .content{padding:20px 0 30px;max-width:none}
    .sechead h2{font-size:1.42rem}
    .topbar .bar{padding:11px 14px;gap:9px}
    .titles .sub{display:none}
    .menubtn{display:inline-flex}
    footer{margin-bottom:24px}
    .navpane{display:flex;flex-direction:column;position:fixed;inset:0;z-index:56;background:var(--bg);
      opacity:0;pointer-events:none;transform:translateY(8px);transition:opacity .2s ease,transform .2s ease}
    .navpane.open{opacity:1;pointer-events:auto;transform:none}
    .navpane-head{display:flex;align-items:center;justify-content:space-between;
      padding:calc(14px + env(safe-area-inset-top)) 18px 14px;border-bottom:1px solid var(--line)}
    .navpane-title{font-size:1.05rem;font-weight:700}
    .navpane-close{width:38px;height:38px;border-radius:50%;border:none;background:var(--surface);
      box-shadow:var(--shadow-sm);cursor:pointer;font-size:1rem;color:var(--ink2)}
    .navpane #moreList{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;
      padding:12px calc(14px + env(safe-area-inset-right)) calc(20px + env(safe-area-inset-bottom)) calc(14px + env(safe-area-inset-left))}
    .navpane .navitem{font-size:1.05rem;padding:15px 14px;border-radius:12px;margin-bottom:2px}
    .sheethandle{width:40px;height:5px;border-radius:99px;background:#d7dee7;margin:8px auto 12px}
    /* settings flyout -> bottom sheet on mobile */
    .flyout{background:rgba(15,30,50,.35);transition:opacity .2s}
    .flyout-card{top:auto;right:0;left:0;bottom:0;width:auto;border:none;border-radius:22px 22px 0 0;
      padding:8px 14px calc(20px + env(safe-area-inset-bottom));transform:translateY(100%);transition:transform .25s}
    .flyout.open .flyout-card{transform:none}
    .flyout .sheethandle{display:block}
    .flyout-title{display:block;text-align:center;margin:0 0 6px;font-size:.72rem;color:var(--muted);
      text-transform:uppercase;letter-spacing:.06em;font-weight:800}
    .flyout .menu-item{font-size:1rem;padding:15px 12px}
  }

  @media(max-width:380px){ .pctext{display:none} }

  @media print{
    .topbar,.sidebar,.navpane,.flyout,.iconbtn,.searchrow,.chev,.gactions,.factions,.addbtn,.rec .rm{display:none!important}
    body{background:#fff}
    .layout{display:block}
    .trow,.gcard,.card,.feature{box-shadow:none;border:1px solid #d4dde7;break-inside:avoid}
    .tdrawer{display:block!important;border-top:1px solid #e3eaf2}
    .disc .body{display:block!important}
    a[href]{color:var(--ink);text-decoration:underline}
  }
</style>
</head>
<body>
<header class="topbar">
  <div class="bar">
    <button class="iconbtn menubtn" onclick="openMore()" aria-label="Sections menu">☰</button>
    <div class="titles"><h1>Flight School Path</h1><p class="sub">From flight sim to real flight training</p></div>
    <button class="iconbtn" onclick="toggleSearch()" aria-label="Search">🔎</button>
    <button class="iconbtn" onclick="openSettings()" aria-label="Settings">⚙️</button>
    <div class="pc" title="Overall progress">
      <svg class="ring" viewBox="0 0 36 36"><circle class="ring-bg" cx="18" cy="18" r="15.9155"/><circle class="ring-fg" id="ringFg" cx="18" cy="18" r="15.9155"/></svg>
      <div class="pctext"><b id="overallPct">0%</b><span id="overallCount">0/0</span></div>
    </div>
  </div>
  <div class="searchrow" id="searchRow"><input id="searchInput" placeholder="Search tasks in this section" oninput="onSearch(this.value)" /></div>
</header>

<div class="layout">
  <aside class="sidebar" id="sidebar"></aside>
  <main class="content">
    <div id="app"></div>
    <footer>
      You don't need to finish everything today · One step at a time ✈️
    </footer>
  </main>
</div>

<div class="navpane" id="moreSheet">
  <div class="navpane-head">
    <span class="navpane-title">Sections</span>
    <button class="navpane-close" onclick="closeMore()" aria-label="Close menu">✕</button>
  </div>
  <div id="moreList"></div>
</div>
<div class="flyout" id="settingsSheet" onclick="if(event.target===this)closeSettings()">
  <div class="flyout-card">
    <div class="sheethandle"></div>
    <div class="flyout-title">Settings</div>
    <button class="menu-item" onclick="closeSettings();printAll()"><span>🖨</span> Print checklist</button>
    <button class="menu-item danger" onclick="closeSettings();resetAll()"><span>↺</span> Reset all progress</button>
    <div class="menu-sync"><div class="syncbadge" id="syncBadge"><span class="dot"></span><span id="syncText">Saved on this device</span></div></div>
  </div>
</div>
<div class="saved-flash" id="flash">Saved</div>

<script>
/* ============================================================
   DATA MODEL
============================================================ */
const SECTIONS = [
  {
    id:"start", ico:"🚀", title:"Start Here",
    sub:"The core checklist. Knock these out and the rest gets easier.",
    items:[
      {t:"Create FAFSA account", link:"https://studentaid.gov/h/apply-for-aid/fafsa", p:"first",
        need:"An email and an FSA ID (username + password) from StudentAid.gov."},
      {t:"Submit FAFSA", link:"https://studentaid.gov/h/apply-for-aid/fafsa", p:"first",
        why:"This unlocks Pell Grants, school aid, and federal loans — the money that makes everything else possible.",

/* ============================================================
   HELPERS
============================================================ */
const esc = s => String(s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
const STATUSES = ["Not started","In progress","Done"];
const MON=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
function fmtDate(iso){ if(!iso) return ""; const p=iso.split("-"); return MON[(+p[1])-1]+" "+(+p[2]); }
function dayDiff(iso){ const t=new Date(); t.setHours(0,0,0,0); const d=new Date(iso+"T00:00:00"); return Math.round((d-t)/86400000); }
function dueClass(iso,status){ if(!iso||status==="Done") return ""; const n=dayDiff(iso); return n<0?"overdue":n<=14?"due-soon":""; }

let ALL_ITEM_IDS = [];
function buildIds(){
  ALL_ITEM_IDS = [];
  SECTIONS.forEach(sec=>sectionItems(sec).forEach(it=>ALL_ITEM_IDS.push(it.id)));
}
function sectionItems(sec){
  const out=[];
  (sec.items||[]).forEach((it,i)=>out.push({...it,id:`${sec.id}.i${i}`}));
  (sec.cards||[]).forEach((card,ci)=>(card.items||[]).forEach((it,i)=>out.push({...it,id:`${sec.id}.c${ci}.i${i}`})));
  return out;
}
function viewSearch(list){
  const q=ui.search.trim().toLowerCase();
  return q ? list.filter(it=>it.t.toLowerCase().includes(q)) : list;
}

/* ============================================================
   RENDER — task rows + drawers
============================================================ */
function taskRow(it){
  const st=itemState(it.id);
  const done=st.status==="Done";
  const open=openDrawers.has(it.id);
  const meta=[];
  if(st.status==="In progress") meta.push(`<span class="tdot">In progress</span>`);
  if(st.deadline) meta.push(`<span class="duechip ${dueClass(st.deadline,st.status)}">${fmtDate(st.deadline)}</span>`);
  const metaHTML=meta.length?`<div class="tmeta">${meta.join("")}</div>`:"";
  return `<div class="trow ${done?'done':''} ${open?'open':''}" data-id="${it.id}">
    <div class="trowmain">
      <button class="check" onclick="event.stopPropagation();toggleDone('${it.id}',${!done})" aria-label="Mark done"></button>
      <div class="tbody" onclick="toggleDrawer('${it.id}')"><div class="ttitle">${esc(it.t)}</div>${metaHTML}</div>
      <button class="chev" onclick="toggleDrawer('${it.id}')" aria-label="Details">⌄</button>
    </div>
    <div class="tdrawer">${drawerHTML(it)}</div>
  </div>`;
}
function drawerHTML(it){
  const st=itemState(it.id);
  let h="";
  if(it.why) h+=`<p class="dwhy">${esc(it.why)}</p>`;
  if(it.need) h+=`<p class="dneed"><b>What you need:</b> ${esc(it.need)}</p>`;
  h+=`<div class="drow">`;
  if(it.link) h+=`<a class="btn primary" href="${esc(it.link)}" target="_blank" rel="noopener">Open link ↗</a>`;
  h+=`<select class="status" onchange="setStatus('${it.id}',this.value)" aria-label="Status">${STATUSES.map(s=>`<option ${s===st.status?'selected':''}>${s}</option>`).join("")}</select></div>`;
  h+=`<div class="dfield"><label>Deadline</label><input type="date" value="${st.deadline||''}" onchange="setDeadline('${it.id}',this.value)"/></div>`;
  h+=`<div class="dfield"><label>Notes</label><textarea placeholder="Add a note…" oninput="setNotes('${it.id}',this.value)">${esc(st.notes||"")}</textarea></div>`;
  return h;
}
function tasksOrEmpty(list,count){
  if(!list.length) return `<div class="empty">${count?"No matching tasks.":"No tasks here yet."}</div>`;
  return `<div class="tasks">${list.map(taskRow).join("")}</div>`;
}
function groupBlock(label,list,cls){
  return `<div class="pgroup ${cls}"><div class="plabel">${esc(label)}</div><div class="tasks">${list.map(taskRow).join("")}</div></div>`;
}
function collapsibleTasks(label,list){
  return `<details class="disc"><summary>${esc(label)}</summary><div class="body"><div class="tasks">${list.map(taskRow).join("")}</div></div></details>`;
}
function discHTML(label,inner){
  return `<details class="disc"><summary>${esc(label)}</summary><div class="body">${inner}</div></details>`;
}

/* Top-level checklist with First / Next / Later / Completed grouping */
function checklistHTML(sec){
  const all=sec.items.map((it,i)=>({...it,id:`${sec.id}.i${i}`}));
  if(ui.search.trim()) return tasksOrEmpty(viewSearch(all), all.length);
  const open=all.filter(it=>itemState(it.id).status!=="Done");
  const done=all.filter(it=>itemState(it.id).status==="Done");
  const first=open.filter(it=>it.p==="first");
  const later=open.filter(it=>it.p==="later");
  const next=open.filter(it=>!it.p||it.p==="next");
  let h="";
  if(!all.length) return `<div class="empty">No tasks here yet.</div>`;
  if(!open.length) h+=`<div class="empty">🎉 Every task here is done.</div>`;
  const named = first.length>0 || later.length>0;
  if(first.length) h+=groupBlock("Do this first",first,"first");
  if(next.length) h+= named ? groupBlock("Next",next,"next") : `<div class="tasks">${next.map(taskRow).join("")}</div>`;
  if(later.length) h+=collapsibleTasks("Later",later);
  if(done.length) h+=collapsibleTasks("Completed · "+done.length,done);
  return h;
}

/* Card group (scholarships / schools) — quiet rows + collapsed Details */
function groupHTML(sec,card,ci){
  const raw=(card.items||[]).map((it,i)=>({...it,id:`${sec.id}.c${ci}.i${i}`}));
  let list=raw;
  if(ui.search.trim()){ list=viewSearch(raw); if(!list.length) return ""; }
  const meta=(card.meta||[]).map(m=>`<span class="pill ${/amount/.test(m[1])?'amount':''}">${esc(m[0])}</span>`).join("");
  let inner="";
  if(card.desc) inner+=`<p>${esc(card.desc)}</p>`;
  if(card.why) inner+=`<p><b>Why it matters:</b> ${esc(card.why)}</p>`;
  if(card.approach) inner+=`<div class="approach"><div class="t">How to approach it</div><ul>${card.approach.map(a=>`<li>${esc(a)}</li>`).join("")}</ul></div>`;
  const action = card.link?`<a class="btn ghost" href="${esc(card.link)}" target="_blank" rel="noopener">Visit site ↗</a>`:"";
  return `<div class="gcard">
    <div class="ghead"><div><h3>${esc(card.h)}</h3>${meta?`<div class="pills">${meta}</div>`:""}</div></div>
    ${inner?discHTML("Details",inner):""}
    <div class="tasks">${list.map(taskRow).join("")}</div>
    ${action?`<div class="gactions">${action}</div>`:""}
  </div>`;
}

    <div class="field"><label>Email</label><input value="${esc(r.email||'')}" placeholder="name@email.com" oninput="setRec(${i},'email',this.value)"/></div>
    <div class="grid2">
      <div class="field"><label>Asked date</label><input type="date" value="${esc(r.asked||'')}" oninput="setRec(${i},'asked',this.value)"/></div>
      <div class="field"><label>Received date</label><input type="date" value="${esc(r.received||'')}" oninput="setRec(${i},'received',this.value)"/></div>
    </div>
    <div class="field"><label>Notes</label><input value="${esc(r.notes||'')}" placeholder="Optional notes" oninput="setRec(${i},'notes',this.value)"/></div>
  </div>`).join("");
  return `<div class="card">
    <p class="desc"><b>Good people to ask:</b> ${REC_ROLES}.</p>
    <p class="hint" style="color:var(--danger);font-weight:600">Avoid family members.</p>
    ${rows}
    <button class="addbtn" onclick="addRec()">+ Add recommender</button>
  </div>`;
}
function roadmapHTML(){
  return `<div class="card">`+ROADMAP.map(p=>`<div class="phase">
    <div class="when">${esc(p.when.split('—')[0])}</div>
    <h4>${esc(p.when.split('—')[1]||p.when)}</h4>
    <ul>${p.items.map(i=>`<li>${esc(i)}</li>`).join("")}</ul>
  </div>`).join("")+`</div>`;
}

/* ============================================================
   PROGRESS · NAV · RENDER
============================================================ */
let activeTab = localStorage.getItem("fsp.tab") || SECTIONS[0].id;
let ui = { search:"" };
const openDrawers = new Set();

function refreshProgress(){
  const total=ALL_ITEM_IDS.length;
  const done=ALL_ITEM_IDS.filter(id=>itemState(id).status==="Done").length;
  const pct=total?Math.round(done/total*100):0;
  const ring=document.getElementById("ringFg"); if(ring) ring.style.strokeDashoffset=(100-pct);
  const p=document.getElementById("overallPct"); if(p) p.textContent=pct+"%";
  const c=document.getElementById("overallCount"); if(c) c.textContent=done+"/"+total;
}
function buildNav(){
  const item=(id)=>`<button class="navitem ${id===activeTab?'active':''}" onclick="selectTab('${id}')"><span class="nicon">${NAV[id].icon}</span><span>${esc(NAV[id].label)}</span></button>`;
  document.getElementById("sidebar").innerHTML =
    `<div class="navgroup">${MAIN_NAV.map(item).join("")}</div>`+
    `<div class="navlabel">More</div>`+
    `<div class="navgroup">${MORE_NAV.map(item).join("")}</div>`;
  // mobile hamburger menu lists every section
  document.getElementById("moreList").innerHTML = SECTIONS.map(s=>item(s.id)).join("");
}
function renderMain(){
  document.getElementById("app").innerHTML = sectionHTML(SECTIONS.find(s=>s.id===activeTab));
}
function render(){
  if(!SECTIONS.some(s=>s.id===activeTab)) activeTab=SECTIONS[0].id;
  buildNav(); renderMain(); refreshProgress();
}
function selectTab(id){
  activeTab=id; localStorage.setItem("fsp.tab",id);
  openDrawers.clear(); closeMore(); closeSettings(); render();
  window.scrollTo({top:0,behavior:"smooth"});
}
function openMore(){ closeSettings(); document.getElementById("moreSheet").classList.add("open"); }
function closeMore(){ document.getElementById("moreSheet").classList.remove("open"); }
function openSettings(){ closeMore(); document.getElementById("settingsSheet").classList.add("open"); }
function closeSettings(){ document.getElementById("settingsSheet").classList.remove("open"); }
function toggleSearch(){
  const r=document.getElementById("searchRow"); r.classList.toggle("open");
  if(r.classList.contains("open")) document.getElementById("searchInput").focus();
  else { document.getElementById("searchInput").value=""; if(ui.search){ ui.search=""; renderMain(); } }
}
function onSearch(v){ ui.search=v; renderMain(); }
function toggleDrawer(id){
  const row=document.querySelector('.trow[data-id="'+id+'"]');
  if(openDrawers.has(id)){ openDrawers.delete(id); if(row) row.classList.remove("open"); }
  else { openDrawers.add(id); if(row){ row.classList.add("open"); } }
}

/* ============================================================
   EVENT HANDLERS
============================================================ */
function toggleDone(id,checked){ itemState(id).status=checked?"Done":"Not started"; save(); renderMain(); refreshProgress(); }
function setStatus(id,val){ itemState(id).status=val; save(); renderMain(); refreshProgress(); }
function setDeadline(id,val){ itemState(id).deadline=val; save(); renderMain(); refreshProgress(); }
function setNotes(id,val){ itemState(id).notes=val; save(true); debouncedFlash(); }

function setSim(k,v){ state.sim[k]=v; save(true); debouncedFlash(); }
function toggleSkill(skill,on){ state.sim.skills[skill]=on; save(); event.target.closest(".chip").classList.toggle("on",on); }
function setEssay(v){ state.essay.draft=v; save(true); debouncedFlash(); }
function setRec(i,k,v){ state.recs[i][k]=v; save(true); debouncedFlash(); }
function addRec(){ state.recs.push({}); save(); renderMain(); }
function removeRec(i){ state.recs.splice(i,1); if(!state.recs.length)state.recs.push({}); save(); renderMain(); }

let flashTimer;
function debouncedFlash(){
  clearTimeout(flashTimer);
  flashTimer=setTimeout(()=>{
    const f=document.getElementById("flash"); f.classList.add("show");
    setTimeout(()=>f.classList.remove("show"),700);
  },600);
}

function printAll(){
  const app=document.getElementById("app"), prev=app.innerHTML, q=ui.search;
  ui.search="";
  app.innerHTML=SECTIONS.map(sectionHTML).join("");
  app.querySelectorAll(".trow").forEach(r=>r.classList.add("open"));
  app.querySelectorAll("details.disc").forEach(d=>d.open=true);
  window.print();
  ui.search=q; app.innerHTML=prev;
}
function resetAll(){
  if(confirm("Reset ALL progress? This clears every checkbox, note, deadline, and saved field. This cannot be undone.")){
    if(confirm("Are you absolutely sure?")){ state=blank(); openDrawers.clear(); save(); render(); }
  }
}

/* ============================================================
   SHARED SYNC
============================================================ */
function setSyncBadge(kind,text){
  const b=document.getElementById("syncBadge");
  b.className="syncbadge"+(kind?" "+kind:"");
  document.getElementById("syncText").textContent=text;
}
function isEditingText(){
  const el=document.activeElement;
  return el && (el.tagName==="TEXTAREA" || (el.tagName==="INPUT" && el.type!=="date" && el.type!=="checkbox"));
}
function pushRemote(){
  if(!sb) return;
  sb.from("boards").upsert({id:WORKSPACE_ID,data:state,updated_at:new Date().toISOString()})
    .then(({error})=>{ if(error) console.warn("sync save failed:",error.message); });
}
function applyRemote(incoming){
  if(JSON.stringify(incoming)===JSON.stringify(state)) return;
  state=Object.assign(blank(),incoming);
  localStorage.setItem(KEY,JSON.stringify(state));
  if(isEditingText()){ pendingRemoteRender=true; return; }
  applyingRemote=true; renderMain(); refreshProgress(); applyingRemote=false;
}
async function initSync(){
  if(!SUPABASE_URL || !SUPABASE_ANON){ setSyncBadge("","Saved on this device"); return; }
  setSyncBadge("","Connecting…");
  try{
    const { createClient } = await import("https://esm.sh/@supabase/supabase-js@2");
    sb = createClient(SUPABASE_URL, SUPABASE_ANON, { realtime:{ params:{ eventsPerSecond:5 } } });
    const { data, error } = await sb.from("boards").select("data").eq("id",WORKSPACE_ID).maybeSingle();
    if(error) throw error;
    if(data && data.data){
      state=Object.assign(blank(),data.data); localStorage.setItem(KEY,JSON.stringify(state));
      applyingRemote=true; renderMain(); refreshProgress(); applyingRemote=false;
    }else{ pushRemote(); }
    sb.channel("board-"+WORKSPACE_ID)
      .on("postgres_changes",
        { event:"*", schema:"public", table:"boards", filter:"id=eq."+WORKSPACE_ID },
        (payload)=>{ if(payload.new && payload.new.data) applyRemote(payload.new.data); })
      .subscribe((st)=>{ if(st==="SUBSCRIBED") setSyncBadge("on","Synced — shared live"); });
    document.addEventListener("focusout", ()=>setTimeout(()=>{
      if(pendingRemoteRender && !isEditingText()){
        pendingRemoteRender=false; applyingRemote=true; renderMain(); refreshProgress(); applyingRemote=false;
      }
    },0));
  }catch(e){
    console.warn("Sync unavailable, using local only:",e);
    setSyncBadge("err","Offline — saved on this device");
  }
}

/* ============================================================
   INIT
============================================================ */
buildIds();
render();
initSync();
</script>
