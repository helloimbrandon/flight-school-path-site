<!DOCTYPE html>
<!-- Flight School Path — auto-deployed from private repo -->
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="theme-color" content="#2b6cb0" />
<title>Flight School Path</title>
<style>
  :root{
    --sky:#3b82f6;
    --sky-deep:#2563eb;
    --sun:#f59e0b;
    --sun-deep:#ea580c;
    --ink:#1e293b;
    --muted:#64748b;
    --line:#e2e8f0;
    --card:#ffffff;
    --bg-top:#eaf4ff;
    --bg-bot:#f7fbff;
    --good:#16a34a;
    --prog:#f59e0b;
    --radius:16px;
    --shadow:0 6px 22px rgba(30,58,95,.08);
    --shadow-sm:0 2px 8px rgba(30,58,95,.06);
  }
  *{box-sizing:border-box}
  html{scroll-behavior:smooth}
  body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    color:var(--ink);
    background:linear-gradient(180deg,var(--bg-top),var(--bg-bot)) fixed;
    line-height:1.5;
    -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:1040px;margin:0 auto;padding:0 16px 50px}

  /* Sticky top stack: header + tabs + controls */
  .topbar{position:sticky;top:0;z-index:30;margin:0 -16px;padding:0 16px;
    background:linear-gradient(180deg,var(--bg-top),var(--bg-bot));
    box-shadow:0 3px 12px rgba(30,58,95,.06);border-bottom:1px solid var(--line)}

  /* Compact header */
  header.hero{display:flex;align-items:center;gap:12px;padding:11px 0 9px}
  .hero .plane{font-size:24px;line-height:1;flex:0 0 auto}
  .hero .titles{min-width:0}
  .hero h1{margin:0;font-size:1.12rem;letter-spacing:-.01em;line-height:1.15;white-space:nowrap}
  .hero .sub{margin:0;color:var(--muted);font-size:.76rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .pc{margin-left:auto;display:flex;align-items:center;gap:10px;flex:1;max-width:360px}
  .pc .pnum{font-size:.8rem;font-weight:700;color:var(--ink);white-space:nowrap}
  .pc .pbar{flex:1;height:8px;border-radius:99px;background:#e6edf5;overflow:hidden}
  .pc .pbar>span{display:block;height:100%;width:0;border-radius:99px;
    background:linear-gradient(90deg,var(--sun),var(--sun-deep));transition:width .4s ease}
  .pc .ppct{font-size:.95rem;font-weight:800;color:var(--sun-deep);white-space:nowrap}
  @media(max-width:640px){
    header.hero{flex-wrap:wrap;gap:6px 10px;padding:9px 0 7px}
    .hero .sub{display:none}
    .hero h1{font-size:1.02rem}
    .pc{max-width:none;width:100%;margin-left:0}
  }

  .bar{height:8px;border-radius:99px;background:#e6edf5;overflow:hidden}
  .bar>span{display:block;height:100%;width:0;border-radius:99px;
    background:linear-gradient(90deg,var(--sky),var(--sky-deep));transition:width .4s ease}

  /* Controls bar */
  .controls{display:flex;gap:7px;align-items:center;padding:0 0 9px;flex-wrap:wrap}
  .controls .search{flex:1 1 150px;min-width:130px;display:flex;align-items:center;gap:6px;
    border:1px solid var(--line);background:#fff;border-radius:9px;padding:6px 9px;color:var(--muted)}
  .controls .search input{border:none;outline:none;width:100%;font-family:inherit;font-size:.85rem;background:transparent;color:var(--ink)}
  .ctl{border:1px solid var(--line);background:#fff;color:var(--ink);border-radius:9px;
    padding:6px 10px;font-size:.78rem;font-weight:700;cursor:pointer;font-family:inherit;white-space:nowrap}
  .ctl:hover{background:#f1f6fc}
  .ctl.on{background:var(--sky);color:#fff;border-color:var(--sky)}
  .ctl.danger{color:#b91c1c;border-color:#fecaca;background:#fff5f5}
  select.ctl{padding-right:6px}
  .controls .syncbadge{margin-left:auto}

  /* Dismissible sim-hours callout */
  .callout{display:flex;gap:10px;align-items:flex-start;background:#fffaf0;border:1px solid #fde7c2;
    border-left:3px solid var(--sun);border-radius:10px;padding:9px 12px;margin:12px 0 2px;
    font-size:.82rem;color:#7c4a03}
  .callout strong{color:#92400e}
  .callout .x{margin-left:auto;flex:0 0 auto;background:none;border:none;color:#b6803a;
    cursor:pointer;font-size:1rem;line-height:1;padding:0 2px}

  /* Sim/essay info banner (kept) */
  .banner{
    background:#fffaf0;border:1px solid #fde7c2;border-left:4px solid var(--sun);
    border-radius:12px;padding:12px 14px;margin:14px 0;font-size:.9rem;color:#7c4a03;
  }
  .banner strong{color:#92400e}

  /* Section tabs */
  nav.jump{display:flex;gap:7px;overflow-x:auto;padding:7px 0;
    -webkit-overflow-scrolling:touch;scrollbar-width:none}
  nav.jump::-webkit-scrollbar{display:none}
  nav.jump .tab{flex:0 0 auto;border:1px solid var(--line);background:#fff;color:var(--sky-deep);
    padding:6px 12px;border-radius:99px;font-size:.8rem;font-weight:700;white-space:nowrap;cursor:pointer;
    font-family:inherit}
  nav.jump .tab.active{background:var(--sky);color:#fff;border-color:var(--sky)}
  .syncbadge{display:flex;align-items:center;gap:6px;font-size:.72rem;font-weight:700;color:var(--muted)}
  .syncbadge .dot{width:8px;height:8px;border-radius:50%;background:#cbd5e1;flex:0 0 auto;transition:.3s}
  .syncbadge.on .dot{background:var(--good);box-shadow:0 0 0 3px rgba(22,163,74,.15)}
  .syncbadge.err .dot{background:var(--sun)}

  /* Section */
  section.block{margin-top:8px;animation:fadein .2s ease}
  @keyframes fadein{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
  .sec-head{display:flex;align-items:center;gap:9px;margin:10px 0 8px}
  .sec-head h2{margin:0;font-size:1.02rem;letter-spacing:-.01em}
  .sec-head .cnt{font-size:.72rem;font-weight:700;color:var(--muted);background:#eef2f7;
    border-radius:99px;padding:2px 8px;white-space:nowrap}
  .sec-head .minibar{width:64px;flex:0 0 auto}

  /* Details disclosure (supporting explanation, kept out of the way) */
  .disc{margin:0 0 10px;border:1px solid var(--line);border-radius:10px;background:#fbfdff;overflow:hidden}
  .disc>summary{cursor:pointer;list-style:none;padding:8px 12px;font-size:.8rem;font-weight:700;
    color:var(--sky-deep);display:flex;align-items:center;gap:7px}
  .disc>summary::-webkit-details-marker{display:none}
  .disc>summary::before{content:"▸";font-size:.7rem;transition:transform .15s}
  .disc[open]>summary::before{transform:rotate(90deg)}
  .disc .body{padding:0 12px 11px;font-size:.86rem;color:#475569}
  .disc .body p{margin:6px 0}
  .disc .body .links{display:flex;flex-wrap:wrap;gap:7px;margin-top:8px}

  /* Card groups (scholarship / school sub-lists) */
  .group{margin:14px 0 6px}
  .group .ghead{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin:0 0 6px}
  .group .ghead h3{margin:0;font-size:.95rem}
  .pill{font-size:.72rem;background:#eef4fb;color:var(--sky-deep);border-radius:99px;padding:2px 8px;font-weight:700}
  .pill.amount{background:#fff4e1;color:var(--sun-deep)}

  .approach{margin:8px 0 0;padding:9px 11px;background:#f4f8fc;border-radius:10px}
  .approach .t{font-size:.74rem;font-weight:800;text-transform:uppercase;letter-spacing:.04em;color:var(--muted)}
  .approach ul{margin:5px 0 0;padding-left:18px;font-size:.86rem;color:#475569}
  .approach li{margin:3px 0}
  .why b{color:var(--ink)}

  .linkbtn{text-decoration:none;font-size:.78rem;font-weight:700;color:#fff;
    background:var(--sky);padding:6px 11px;border-radius:99px;display:inline-flex;align-items:center;gap:5px}
  .linkbtn:active{background:var(--sky-deep)}

  /* Compact task rows */
  .tasks{display:flex;flex-direction:column;gap:6px}
  .empty{padding:18px 12px;text-align:center;color:var(--muted);font-size:.86rem;
    border:1px dashed var(--line);border-radius:11px;background:#fbfdff}
  .trow{display:flex;flex-wrap:wrap;align-items:center;gap:8px 10px;min-height:56px;padding:8px 12px;background:#fff;
    border:1px solid var(--line);border-radius:11px;transition:background .15s,border-color .15s}
  .trow.done{background:#f6fdf8;border-color:#cdeed6}
  .trow[data-status="In progress"]{border-color:#fde68a;background:#fffdf6}
  .cb{appearance:none;-webkit-appearance:none;width:22px;height:22px;flex:0 0 auto;
    border:2px solid var(--sky);border-radius:7px;cursor:pointer;position:relative;background:#fff;transition:.15s}
  .cb:checked{background:var(--good);border-color:var(--good)}
  .cb:checked::after{content:"✓";position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
    color:#fff;font-size:13px;font-weight:900}
  .ttitle{flex:1;min-width:0;font-size:.92rem;font-weight:600;line-height:1.3}
  .ttitle .sectag{display:block;font-size:.68rem;font-weight:700;color:var(--sky-deep);
    text-transform:uppercase;letter-spacing:.03em;margin-bottom:1px}
  .trow.done .ttitle{text-decoration:line-through;color:var(--muted)}
  .trow.done .ttitle .sectag{text-decoration:none}
  .tctrls{display:flex;align-items:center;gap:6px;flex:0 0 auto}
  .status{font-size:.74rem;font-weight:700;border:1px solid var(--line);border-radius:99px;
    padding:5px 8px;background:#fff;cursor:pointer;color:var(--ink);font-family:inherit}
  .status[data-s="In progress"]{background:#fef9e7;border-color:#fde68a;color:#92400e}
  .status[data-s="Done"]{background:#ecfdf3;border-color:#bbf7d0;color:#166534}
  .datewrap{position:relative;display:inline-flex}
  .datewrap input{position:absolute;inset:0;width:100%;height:100%;opacity:0;cursor:pointer;border:0;padding:0}
  .due{border:1px solid var(--line);border-radius:8px;padding:5px 7px;font-size:.74rem;font-weight:700;
    font-family:inherit;color:var(--muted);background:#fff;cursor:pointer;white-space:nowrap}
  .due.set{color:var(--ink)}
  .due.due-soon{border-color:var(--sun);background:#fff7ed;color:var(--sun-deep)}
  .due.overdue{border-color:#fca5a5;background:#fef2f2;color:#b91c1c}
  .ic{width:30px;height:30px;flex:0 0 auto;display:inline-flex;align-items:center;justify-content:center;
    border:1px solid var(--line);border-radius:8px;background:#fff;cursor:pointer;color:var(--sky-deep);
    font-size:.85rem;text-decoration:none;position:relative;padding:0}
  .ic:hover{background:#f1f6fc}
  .ic.has::after{content:"";position:absolute;top:-3px;right:-3px;width:8px;height:8px;border-radius:50%;
    background:var(--sun);border:1.5px solid #fff}
  .tnotes{display:none;flex:0 0 100%;width:100%}
  .tnotes.open{display:block}
  .tnotes textarea{width:100%;border:1px solid var(--line);border-radius:9px;padding:7px;
    font-family:inherit;font-size:.84rem;resize:vertical;min-height:44px}
  @media(max-width:640px){
    .trow{flex-wrap:wrap;align-items:flex-start;gap:7px 10px;padding:9px 11px}
    .ttitle{flex:1 1 calc(100% - 32px)}
    .tctrls{width:100%;padding-left:32px;justify-content:flex-start;flex-wrap:wrap}
  }

  /* Field "fill me in" polish */
  .field input::placeholder,.field textarea::placeholder,.tnotes textarea::placeholder{color:#9fb3c8}
  .field input:placeholder-shown,.field textarea:placeholder-shown{
    border-style:dashed;border-color:#c3dafc;background:#f7fbff}
  .field input:focus,.field textarea:focus,.field select:focus,.tnotes textarea:focus{
    outline:none;border-style:solid;border-color:var(--sky);box-shadow:0 0 0 3px rgba(59,130,246,.15);background:#fff}

  /* Light card (used by Sim / Essay / Recs / Roadmap blocks) */
  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px;margin-bottom:12px}
  .card h3{margin:0 0 4px;font-size:1rem}
  .card p.desc{margin:6px 0;font-size:.9rem;color:#475569}
  .card p.desc b{color:var(--ink)}

  /* generic field */
  .field{margin:10px 0}
  .field label{display:block;font-size:.8rem;font-weight:700;color:var(--muted);margin-bottom:4px}
  .field input,.field textarea,.field select{width:100%;border:1px solid var(--line);border-radius:10px;
    padding:9px;font-family:inherit;font-size:.9rem}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  @media(max-width:480px){.grid2{grid-template-columns:1fr}}

  /* skill chips */
  .chips{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px}
  .chip{display:inline-flex;align-items:center;gap:7px;border:1px solid var(--line);border-radius:99px;
    padding:7px 12px;font-size:.85rem;cursor:pointer;background:#fff;user-select:none;font-weight:600}
  .chip input{accent-color:var(--good);width:16px;height:16px}
  .chip.on{background:#ecfdf3;border-color:#bbf7d0;color:#166534}

  /* roadmap */
  .phase{border-left:3px solid var(--sky);padding:2px 0 2px 14px;margin:0 0 16px}
  .phase h4{margin:0 0 2px;font-size:1rem;color:var(--sky-deep)}
  .phase .when{font-size:.75rem;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.04em}
  .phase ul{margin:6px 0 0;padding-left:18px;font-size:.9rem;color:#475569}
  .phase li{margin:3px 0}

  /* rec rows */
  .rec{border:1px solid var(--line);border-radius:12px;padding:12px;margin-bottom:10px;background:#fff;position:relative}
  .rec .rm{position:absolute;top:8px;right:8px;background:#fef2f2;color:#b91c1c;border:1px solid #fecaca;
    border-radius:8px;width:26px;height:26px;cursor:pointer;font-weight:800}
  .addbtn{width:100%;border:1px dashed var(--sky);background:#f0f7ff;color:var(--sky-deep);
    border-radius:12px;padding:11px;font-weight:700;cursor:pointer;font-size:.9rem}
  .hint{font-size:.8rem;color:var(--muted);margin:4px 0 0}

  footer{text-align:center;color:var(--muted);font-size:.8rem;margin-top:40px;padding-top:16px;border-top:1px solid var(--line)}

  .saved-flash{position:fixed;bottom:16px;left:50%;transform:translateX(-50%) translateY(60px);
    background:var(--ink);color:#fff;padding:9px 16px;border-radius:99px;font-size:.82rem;font-weight:600;
    opacity:0;transition:.3s;z-index:50;box-shadow:0 6px 18px rgba(0,0,0,.2)}
  .saved-flash.show{opacity:1;transform:translateX(-50%) translateY(0)}

  /* Print */
  @media print{
    body{background:#fff}
    .topbar,.callout,.saved-flash,.ic,.addbtn,.rec .rm,footer .ctl{display:none!important}
    .tnotes.open{display:block!important}
    .disc{border:none;background:none;margin:4px 0}
    .disc>summary{display:none}
    .disc[open] .body{padding:0}
    .trow,.card{box-shadow:none;break-inside:avoid;border-color:#cbd5e1}
    .sec-head h2{font-size:1.1rem}
    a[href]{color:var(--ink);text-decoration:underline}
  }
</style>
</head>
<body>
<div class="wrap">

  <div class="topbar">
    <header class="hero">
      <span class="plane">🛩️</span>
      <div class="titles">
        <h1>Flight School Path</h1>
        <p class="sub">From flight sim to real flight training</p>
      </div>
      <div class="pc">
        <span class="pnum" id="overallCount">0/0</span>
        <div class="pbar"><span id="overallBar"></span></div>
        <span class="ppct" id="overallPct">0%</span>
      </div>
    </header>

    <nav class="jump" id="jumpNav"></nav>

    <div class="controls">
      <label class="search">🔎<input id="searchInput" placeholder="Search tasks…" oninput="onSearch(this.value)" /></label>
      <select class="ctl" id="filterSel" onchange="setFilter(this.value)" aria-label="Filter tasks">
        <option value="all">All</option>
        <option value="Not started">Not started</option>
        <option value="In progress">In progress</option>
        <option value="Done">Done</option>
      </select>
      <button class="ctl" id="sortBtn" onclick="toggleSort()" title="Sort by due date">↕ Due</button>
      <button class="ctl" id="collapseBtn" onclick="toggleCollapse()">Hide done</button>
      <button class="ctl" id="next5Btn" onclick="toggleNext5()">★ Next 5</button>
      <div class="syncbadge" id="syncBadge"><span class="dot"></span><span id="syncText">Saved on this device</span></div>
    </div>
  </div>

  <div id="simCallout" class="callout">
    <span>🛩️</span>
    <div><strong>Sim hours = self-directed study,</strong> not logged flight time — it shows commitment and
      discipline, but doesn't replace real instruction or FAA hours.</div>
    <button class="x" onclick="dismissCallout()" aria-label="Dismiss">✕</button>
  </div>

  <main id="app"></main>

  <footer>
    <div style="margin-bottom:8px;display:flex;gap:7px;justify-content:center;flex-wrap:wrap">
      <button class="ctl" onclick="printAll()">🖨 Print checklist</button>
      <button class="ctl danger" onclick="resetAll()">↺ Reset all</button>
    </div>
    Progress saves automatically · One step at a time ✈️
  </footer>
</div>

<div class="saved-flash" id="flash">Saved</div>

<script>
/* ============================================================
   DATA MODEL
============================================================ */

      },

// returns items belonging to a section (top-level + inside cards), with stable ids
function sectionItems(sec){
  const out=[];
  (sec.items||[]).forEach((it,i)=>out.push({...it,id:`${sec.id}.i${i}`}));

}

const MON=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
function fmtDate(iso){ if(!iso) return ""; const p=iso.split("-"); return MON[(+p[1])-1]+" "+(+p[2]); }
function dayDiff(iso){ const t=new Date(); t.setHours(0,0,0,0); const d=new Date(iso+"T00:00:00"); return Math.round((d-t)/86400000); }
function dueClass(iso,status){ if(!iso||status==="Done") return ""; const n=dayDiff(iso); return n<0?"overdue":n<=14?"due-soon":""; }

// Compact task row. `it` = {id, t, link?, sectag?}
function taskRow(it){
  const st=itemState(it.id);
  const done=st.status==="Done";
  const hasNotes=(st.notes||"").trim().length>0;
  const dcls=dueClass(st.deadline,st.status);
  const dlabel=st.deadline?fmtDate(st.deadline):"📅";
  const link=it.link?`<a class="ic" href="${esc(it.link)}" target="_blank" rel="noopener" title="Open link">↗</a>`:"";
  const tag=it.sectag?`<span class="sectag">${esc(it.sectag)}</span>`:"";
  return `<div class="trow ${done?'done':''}" data-id="${it.id}" data-status="${st.status}">
    <input type="checkbox" class="cb" ${done?'checked':''} onchange="toggleDone('${it.id}',this.checked)" aria-label="Mark done"/>
    <div class="ttitle">${tag}${esc(it.t)}</div>
    <div class="tctrls">
      <select class="status" data-s="${st.status}" onchange="setStatus('${it.id}',this.value)" aria-label="Status">
        ${STATUSES.map(s=>`<option ${s===st.status?'selected':''}>${s}</option>`).join("")}
      </select>
      <span class="datewrap">
        <span class="due ${st.deadline?'set':''} ${dcls}">${dlabel}</span>
        <input type="date" value="${st.deadline||''}" onclick="this.showPicker&&this.showPicker()" onchange="setDeadline('${it.id}',this.value)" aria-label="Due date"/>
      </span>
      ${link}
      <button class="ic ${hasNotes?'has':''}" onclick="toggleNotes('${it.id}')" title="Notes" aria-label="Notes">📝</button>
    </div>
    <div class="tnotes" id="n_${it.id}">
      <textarea placeholder="Add a note…" oninput="setNotes('${it.id}',this.value)">${esc(st.notes||"")}</textarea>
    </div>
  </div>`;
}

// Apply current filter / search / collapse / sort to a list of {id,t,...}
function viewTasks(list){
  const q=ui.search.trim().toLowerCase();
  let r=list.filter(it=>{
    const st=itemState(it.id);
    if(q && !it.t.toLowerCase().includes(q)) return false;
    if(ui.filter!=="all" && st.status!==ui.filter) return false;
    if(ui.collapseDone && st.status==="Done" && ui.filter!=="Done") return false;
    return true;
  });
  if(ui.sortDue){
    r=r.map((it,i)=>({it,i})).sort((a,b)=>{
      const da=itemState(a.it.id).deadline||"", db=itemState(b.it.id).deadline||"";
      if(da&&db) return da<db?-1:da>db?1:a.i-b.i;
      if(da) return -1; if(db) return 1; return a.i-b.i;
    }).map(x=>x.it);
  }
  return r;
}
function tasksOrEmpty(list, originalCount){
  if(!list.length) return `<div class="empty">${originalCount?"No tasks match the current filter or search.":"No tasks here yet."}</div>`;
  return `<div class="tasks">${list.map(taskRow).join("")}</div>`;
}
function discHTML(label, inner){
  return `<details class="disc"><summary>${esc(label)}</summary><div class="body">${inner}</div></details>`;
}

function sectionProgress(sec){
  const ids=sectionItems(sec).map(i=>i.id);
  const total=ids.length;
  const done=ids.filter(id=>itemState(id).status==="Done").length;
  return {done,total};
}

// A card becomes a lightweight "group": slim header + collapsible Details + task rows
function groupHTML(sec,card,ci){
  const raw=(card.items||[]).map((it,i)=>({...it,id:`${sec.id}.c${ci}.i${i}`}));
  const items=viewTasks(raw);
  if(raw.length && !items.length) return ""; // entire group filtered out
  const meta=(card.meta||[]).map(m=>`<span class="${m[1]}">${esc(m[0])}</span>`).join("");
  let inner="";
  if(card.desc) inner+=`<p>${esc(card.desc)}</p>`;
  if(card.why) inner+=`<p class="why"><b>Why it matters:</b> ${esc(card.why)}</p>`;
  if(card.approach) inner+=`<div class="approach"><div class="t">Application approach</div><ul>${card.approach.map(a=>`<li>${esc(a)}</li>`).join("")}</ul></div>`;
  if(card.link) inner+=`<div class="links"><a class="linkbtn" href="${esc(card.link)}" target="_blank" rel="noopener">Visit site ↗</a></div>`;
  return `<div class="group">
    <div class="ghead"><h3>${esc(card.h)}</h3>${meta}</div>
    ${inner?discHTML("Details",inner):""}
    <div class="tasks">${items.map(taskRow).join("")}</div>
  </div>`;
}

function sectionHTML(sec){
  const p=sectionProgress(sec);
  const pct=p.total?Math.round(p.done/p.total*100):0;
  const cnt = p.total?`<span class="cnt">${p.done}/${p.total}</span>
     <div class="bar minibar"><span style="width:${pct}%"></span></div>`:"";
  let body=`<div class="sec-head"><h2>${sec.ico} ${esc(sec.title)}</h2>${cnt}</div>`;

  // Supporting explanation -> collapsed Details (kept out of the way, above tasks)
  let secInner="";
  if(sec.sub) secInner+=`<p>${esc(sec.sub)}</p>`;
  if(sec.links) secInner+=`<div class="links">`+sec.links.map(l=>`<a class="linkbtn" href="${esc(l.url)}" target="_blank" rel="noopener">${esc(l.label)} ↗</a>`).join("")+`</div>`;
  if(secInner) body+=discHTML("Details & resources", secInner);

  // top-level checklist (Start Here)
  if(sec.items && !sec.custom){
    body+=tasksOrEmpty(viewTasks(sec.items.map((it,i)=>({...it,id:`${sec.id}.i${i}`}))), sec.items.length);
  }
  if(sec.cards){ body+=sec.cards.map((c,ci)=>groupHTML(sec,c,ci)).join(""); }
  if(sec.custom==="sim") body+=simHTML();
  if(sec.custom==="essay") body+=essayHTML(sec);
  if(sec.custom==="recs") body+=recsHTML();
  if(sec.custom==="roadmap") body+=roadmapHTML();

  return `<section class="block" id="sec-${sec.id}">${body}</section>`;
}

function allOpenTasks(){
  const out=[];
  SECTIONS.forEach(sec=>{
    (sec.items||[]).forEach((it,i)=>out.push({id:`${sec.id}.i${i}`,t:it.t,link:it.link,sectag:shortTitle(sec.title)}));
    (sec.cards||[]).forEach((c,ci)=>(c.items||[]).forEach((it,i)=>out.push({id:`${sec.id}.c${ci}.i${i}`,t:it.t,link:it.link,sectag:shortTitle(sec.title)})));

  return out.filter(it=>itemState(it.id).status!=="Done").sort((a,b)=>{
    const da=itemState(a.id).deadline||"", db=itemState(b.id).deadline||"";
    if(da&&db) return da<db?-1:da>db?1:0; if(da) return -1; if(db) return 1; return 0;
  });
}

}
function setEssay(v){ state.essay.draft=v; save(true); debouncedFlash(); }

function setRec(i,k,v){ state.recs[i][k]=v; save(true); debouncedFlash(); }
function addRec(){ state.recs.push({}); save(); render(); }
function removeRec(i){ state.recs.splice(i,1); if(!state.recs.length)state.recs.push({}); save(); render(); }

let flashTimer;
function debouncedFlash(){
  clearTimeout(flashTimer);
  flashTimer=setTimeout(()=>{
    const f=document.getElementById("flash"); f.classList.add("show");
    setTimeout(()=>f.classList.remove("show"),700);
  },600);
}

/* ============================================================
   TOOLBAR ACTIONS
============================================================ */
function resetAll(){
  if(confirm("Reset ALL progress? This clears every checkbox, note, deadline, and saved field. This cannot be undone.")){
    if(confirm("Are you absolutely sure?")){
      state=blank(); save(); render();
    }
  }
}

/* ============================================================
   SHARED SYNC
============================================================ */
function setSyncBadge(kind,text){
  const b=document.getElementById("syncBadge");
  b.className="syncbadge"+(kind?" "+kind:"");
  document.getElementById("syncText").textContent=text;
}
function isEditingText(){
  const el=document.activeElement;
  return el && (el.tagName==="TEXTAREA" || (el.tagName==="INPUT" && el.type!=="date" && el.type!=="checkbox"));
}
function pushRemote(){
  if(!sb) return;
  sb.from("boards").upsert({id:WORKSPACE_ID,data:state,updated_at:new Date().toISOString()})
    .then(({error})=>{ if(error) console.warn("sync save failed:",error.message); });
}
function applyRemote(incoming){
  if(JSON.stringify(incoming)===JSON.stringify(state)) return; // ignore our own echo
  state=Object.assign(blank(),incoming);
  localStorage.setItem(KEY,JSON.stringify(state));
  if(isEditingText()){ pendingRemoteRender=true; return; }
  applyingRemote=true; render(); applyingRemote=false;
}
async function initSync(){
  if(!SUPABASE_URL || !SUPABASE_ANON){ setSyncBadge("","Saved on this device"); return; }
  setSyncBadge("","Connecting…");
  try{
    const { createClient } = await import("https://esm.sh/@supabase/supabase-js@2");
    sb = createClient(SUPABASE_URL, SUPABASE_ANON, { realtime:{ params:{ eventsPerSecond:5 } } });
    const { data, error } = await sb.from("boards").select("data").eq("id",WORKSPACE_ID).maybeSingle();
    if(error) throw error;
    if(data && data.data){
      state=Object.assign(blank(),data.data); localStorage.setItem(KEY,JSON.stringify(state));
      applyingRemote=true; render(); applyingRemote=false;
    }else{ pushRemote(); } // seed shared board from this device
    sb.channel("board-"+WORKSPACE_ID)
      .on("postgres_changes",
        { event:"*", schema:"public", table:"boards", filter:"id=eq."+WORKSPACE_ID },
        (payload)=>{ if(payload.new && payload.new.data) applyRemote(payload.new.data); })
      .subscribe((st)=>{ if(st==="SUBSCRIBED") setSyncBadge("on","Synced — shared live"); });
    document.addEventListener("focusout", ()=>setTimeout(()=>{
      if(pendingRemoteRender && !isEditingText()){
        pendingRemoteRender=false; applyingRemote=true; render(); applyingRemote=false;
      }
    },0));
  }catch(e){
    console.warn("Sync unavailable, using local only:",e);
    setSyncBadge("err","Offline — saved on this device");
  }
}

/* ============================================================
   INIT
============================================================ */
buildIds();
render();
initSync();
</script>
